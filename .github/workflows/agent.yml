name: Crowdfame Event Agent

on:
  # Run every day at 6 AM UTC (1 AM CT — before US business day)
  schedule:
    - cron: "0 6 * * *"

  # Allow manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (validate but don't post)"
        required: false
        default: "false"
        type: boolean

jobs:
  run-agent:
    name: Scrape → Validate → Post
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run event agent
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CROWDFAME_API_URL: ${{ secrets.CROWDFAME_API_URL }}
          CROWDFAME_API_KEY: ${{ secrets.CROWDFAME_API_KEY }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          cd src
          python main.py

      - name: Upload run logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-logs-${{ github.run_number }}
          path: src/logs/
          retention-days: 30

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Event Agent Failed — Run #${context.runNumber}`,
              body: `The Crowdfame event pipeline failed.\n\nRun: https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['agent-failure']
            })
